name: CI/CD for React App

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Job này vẫn build trên server GitHub cho nhanh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/react-app:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted # <--- SỬA Ở ĐÂY: Chạy trực tiếp trên AWS của bạn
    steps:
      - name: Pull and Run Container
        run: |
          # Login Docker để pull image (nếu là repo private)
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # Pull image mới nhất
          docker pull ${{ secrets.DOCKER_USERNAME }}/react-app:latest
          
          # Dừng và xóa container cũ
          docker stop react-container || true
          docker rm react-container || true
          
          # Chạy container mới trên port 3004
          docker run -d --name react-container -p 3004:80 ${{ secrets.DOCKER_USERNAME }}/react-app:latest